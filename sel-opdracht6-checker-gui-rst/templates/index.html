<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SELab Opdracht 6 Checker</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <style>
    html, body   { background: #1e1e24; min-height: 100vh; color: #dde; }
    .sidebar     { background: #18181e; min-height: 100vh; width: 275px;
                   flex-shrink: 0; border-right: 1px solid #2a2a34; }
    .main-panel  { flex: 1; overflow-y: auto; }

    /* form controls */
    .form-control, .form-control:focus {
      background: #1a1a22; color: #dde; border-color: #3a3a46;
    }
    .form-control::placeholder { color: #555; }
    .form-label  { color: #aaa; font-size: .82rem; margin-bottom: .18rem; }
    .text-dim    { color: #555; font-size: .74rem; }
    hr           { border-color: #2e2e3a !important; }

    /* section card */
    .sec-card {
      display: flex; border-radius: 8px; overflow: hidden;
      margin-bottom: 8px; cursor: pointer;
      border: 1px solid transparent; transition: border-color .15s;
    }
    .sec-card:hover { border-color: var(--accent); }
    .sec-accent     { width: 4px; flex-shrink: 0; }
    .sec-body       { background: #282830; flex: 1; padding: 11px 14px; }

    /* badges */
    .badge-status {
      display: inline-block; border-radius: 4px; padding: 2px 7px;
      font-size: .72rem; font-weight: 700; color: #fff;
    }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh">

  <!-- ── Sidebar ─────────────────────────────────────────────────── -->
  <div class="sidebar p-3 d-flex flex-column">
    <h6 class="mb-3" style="color:#ccd">⚙ Configuration</h6>

    <div class="mb-2">
      <label class="form-label">Target (hostname / IP)</label>
      <input id="f-target" type="text" class="form-control form-control-sm"
             value="{{ default_target }}" placeholder="192.168.56.20">
    </div>
    <div class="mb-2">
      <label class="form-label">Local user</label>
      <input id="f-local-user" type="text" class="form-control form-control-sm"
             value="{{ local_user }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Decryption passphrase</label>
      <input id="f-passphrase" type="password" class="form-control form-control-sm"
             placeholder="passphrase for secrets.env.enc">
      <div class="text-dim mt-1">Embedded secrets decrypted at runtime</div>
    </div>

    <div id="run-msg" class="small mb-2" style="min-height:1.1em"></div>

    <button class="btn btn-primary btn-sm w-100 mb-3" onclick="doRunAll()">▶ Run All</button>

    <hr>

    <!-- stats — HTMX-polled every 2 s -->
    <div id="stats-bar"
         hx-get="/fragments/stats"
         hx-trigger="load, every 2s"
         hx-swap="outerHTML">
    </div>

    <div class="mt-auto pt-3 text-dim" style="font-size:.7rem">
      <a href="/api/status" target="_blank" style="color:#3884f4">GET /api/status</a><br>
      <span style="color:#555">POST /api/run</span><br>
      <span style="color:#555">POST /api/run/:check_id</span>
    </div>
  </div>

  <!-- ── Main panel ──────────────────────────────────────────────── -->
  <div class="main-panel p-3">
    <h5 class="mb-3" style="color:#dde">SELab Opdracht 6 Checker</h5>

    <div class="row g-3">
      <!-- Section grid (left) — HTMX-polled -->
      <div class="col-xl-5 col-lg-5">
        <div id="dashboard"
             hx-get="/fragments/dashboard"
             hx-trigger="load, every 2s"
             hx-swap="outerHTML">
        </div>
      </div>

      <!-- Detail panel (right) -->
      <div class="col-xl-7 col-lg-7">
        <div id="detail-panel" style="min-height: 200px">
          <p class="text-dim text-center pt-5">Click a section card to view details</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Track which section is currently shown so runSingle can refresh it.
let currentSection = null;

async function doRunAll() {
  const btn = document.querySelector('button[onclick="doRunAll()"]');
  const msg = document.getElementById('run-msg');
  btn.disabled = true;
  msg.style.color = '#888';
  msg.textContent = 'Starting…';
  try {
    const r = await fetch('/api/run');
    const data = await r.json();
    if (data.error) {
      msg.style.color = '#da3633';
      msg.textContent = '❌ ' + data.error;
    } else {
      msg.style.color = '#2ea043';
      msg.textContent = '✅ ' + data.message;
    }
  } catch(e) {
    msg.style.color = '#da3633';
    msg.textContent = '❌ ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function showSection(sectionId) {
  currentSection = sectionId;
  htmx.ajax('GET', '/fragments/section/' + sectionId, {
    target: '#detail-panel',
    swap:   'innerHTML'
  });
}

async function runSingle(checkId) {
  // Immediately clear the detail panel so old results don't linger.
  if (currentSection) {
    document.getElementById('detail-panel').innerHTML =
      '<div style="color:#6e7681; font-size:.8rem; padding:8px">Starting…</div>';
  }

  try {
    const r    = await fetch('/api/run/' + checkId);
    const data = await r.json();
    if (data.error) {
      document.getElementById('detail-panel').innerHTML =
        '<div style="color:#da3633; font-size:.8rem; padding:8px">❌ ' + data.error + '</div>';
      return;
    }
  } catch(e) {
    document.getElementById('detail-panel').innerHTML =
      '<div style="color:#da3633; font-size:.8rem; padding:8px">❌ ' + e.message + '</div>';
    return;
  }

  // Poll the section fragment rapidly until the check is no longer running.
  if (currentSection) {
    let polls = 0;
    const interval = setInterval(() => {
      htmx.ajax('GET', '/fragments/section/' + currentSection, {
        target: '#detail-panel',
        swap:   'innerHTML'
      });
      polls++;
      if (polls > 60) clearInterval(interval);
      if (!document.getElementById('detail-panel')
            ?.textContent?.includes('running…')) {
        clearInterval(interval);
      }
    }, 500);
  }
}
</script>
</body>
</html>
