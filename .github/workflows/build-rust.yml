name: Build Rust Checker

on:
  push:
    branches: [main, master, 'feat/**']
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sel-checker-linux-amd64
            binary: sel-checker
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: sel-checker-linux-arm64
            binary: sel-checker
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sel-checker-macos-arm64
            binary: sel-checker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sel-checker-windows-amd64
            binary: sel-checker.exe

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: sel-opdracht6-checker-gui-rst

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sel-opdracht6-checker-gui-rst/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('sel-opdracht6-checker-gui-rst/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxi-dev \
            libx11-dev \
            libgl-dev \
            libegl-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sel-opdracht6-checker-gui-rst/target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            file=$(find "$dir" -type f | head -1)
            if [[ "$name" == *windows* ]]; then
              cp "$file" "release/${name}.exe"
            else
              cp "$file" "release/${name}"
              chmod +x "release/${name}"
            fi
          done
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
