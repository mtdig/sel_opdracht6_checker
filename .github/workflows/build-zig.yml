name: Build Zig Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            arch-label: linux-amd64
            ext: ""

          - name: linux-arm64
            os: ubuntu-24.04-arm
            arch-label: linux-arm64
            ext: ""

          - name: macos-arm64
            os: macos-latest
            arch-label: macos-arm64
            ext: ""

          - name: windows-amd64
            os: windows-latest
            arch-label: windows-amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Zig ──
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # ── System dependencies (Linux) ──
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-ttf-dev libcurl4-openssl-dev

      # ── System dependencies (macOS) ──
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sdl2 sdl2_ttf curl

      # ── System dependencies (Windows) ──
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download SDL2 development libraries (mingw)
          $SDL2_VERSION = "2.32.4"
          $SDL2_TTF_VERSION = "2.24.0"
          $CURL_VERSION = "8.14.1_1"

          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-$SDL2_VERSION/SDL2-devel-$SDL2_VERSION-mingw.zip" -OutFile SDL2.zip
          Expand-Archive SDL2.zip -DestinationPath deps
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL_ttf/releases/download/release-$SDL2_TTF_VERSION/SDL2_ttf-devel-$SDL2_TTF_VERSION-mingw.zip" -OutFile SDL2_ttf.zip
          Expand-Archive SDL2_ttf.zip -DestinationPath deps
          Invoke-WebRequest -Uri "https://curl.se/windows/dl-$CURL_VERSION/curl-$CURL_VERSION-win64-mingw.zip" -OutFile curl.zip
          Expand-Archive curl.zip -DestinationPath deps

          # The curl.se static libcurl.a has hundreds of transitive deps
          # (OpenSSL, nghttp2, zlib, brotli …). Remove it so Zig links
          # against the DLL import lib instead.
          $curlDir = (Get-ChildItem -Path deps -Recurse -Directory -Filter "curl-*-win64-mingw" | Select-Object -First 1).FullName
          Remove-Item -Path "$curlDir\lib\libcurl.a" -ErrorAction SilentlyContinue

          # Zig searches for libcurl.a, curl.lib, or curl.dll — not
          # libcurl.dll.a.  Rename the import lib so Zig finds it.
          if (Test-Path "$curlDir\lib\libcurl.dll.a") {
            Rename-Item "$curlDir\lib\libcurl.dll.a" "libcurl.a"
          } else {
            # No import lib — copy the DLL as curl.dll so Zig can link it
            $dll = (Get-ChildItem -Path "$curlDir\bin" -Filter "libcurl*.dll" | Select-Object -First 1).FullName
            if ($dll) { Copy-Item $dll "$curlDir\lib\curl.dll" }
          }

      # ── Build ──
      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        working-directory: sel-opdracht6-checker-zig
        run: |
          zig build -Doptimize=ReleaseSafe

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: sel-opdracht6-checker-zig
        shell: pwsh
        run: |
          # Locate the extracted mingw directories
          $sdl2 = (Get-ChildItem -Path ../deps -Recurse -Directory -Filter "x86_64-w64-mingw32" | Where-Object { $_.FullName -match "SDL2-\d" -and $_.FullName -notmatch "SDL2_ttf" } | Select-Object -First 1).FullName
          $sdl2ttf = (Get-ChildItem -Path ../deps -Recurse -Directory -Filter "x86_64-w64-mingw32" | Where-Object { $_.FullName -match "SDL2_ttf" } | Select-Object -First 1).FullName
          $curlDir = (Get-ChildItem -Path ../deps -Recurse -Directory -Filter "curl-*-win64-mingw" | Select-Object -First 1).FullName

          # Merge SDL2 and SDL2_ttf into a single prefix so SDL2_ttf.h
          # can find SDL.h via relative #include "SDL.h"
          $merged = "${{ github.workspace }}\sdl2-merged"
          New-Item -ItemType Directory -Path $merged -Force | Out-Null
          Copy-Item -Path "$sdl2\*" -Destination $merged -Recurse -Force
          Copy-Item -Path "$sdl2ttf\*" -Destination $merged -Recurse -Force

          # Force DLL linking for SDL2/SDL2_ttf too — the static libs
          # pull in dozens of Windows system deps (gdi32, imm32, …).
          # Rename .dll.a → .a so Zig picks the DLL import libs.
          foreach ($lib in @("libSDL2", "libSDL2_ttf", "libSDL2main")) {
            $dllA = "$merged\lib\$lib.dll.a"
            $staticA = "$merged\lib\$lib.a"
            if (Test-Path $dllA) {
              Remove-Item $staticA -ErrorAction SilentlyContinue
              Rename-Item $dllA "$lib.a"
            }
          }

          zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-windows-gnu `
            -Dextra-include="$merged\include\SDL2" `
            --search-prefix "$merged" `
            --search-prefix "$curlDir"

      # ── Package and upload ──
      - name: Package binary (Linux / macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "sel-opdracht6-checker-zig/zig-out/bin/sel-checker" \
             "sel-checker-${{ matrix.arch-label }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item "sel-opdracht6-checker-zig/zig-out/bin/sel-checker.exe" "dist/"
          # Bundle required DLLs
          $sdl2Bin = (Get-ChildItem -Path deps -Recurse -Filter "SDL2.dll" | Where-Object { $_.FullName -match "x86_64" } | Select-Object -First 1).FullName
          $sdl2ttfBin = (Get-ChildItem -Path deps -Recurse -Filter "SDL2_ttf.dll" | Where-Object { $_.FullName -match "x86_64" } | Select-Object -First 1).FullName
          $curlBin = (Get-ChildItem -Path deps -Recurse -Filter "libcurl*.dll" | Select-Object -First 1)
          if ($sdl2Bin) { Copy-Item $sdl2Bin "dist/" }
          if ($sdl2ttfBin) { Copy-Item $sdl2ttfBin "dist/" }
          if ($curlBin) { Copy-Item $curlBin.FullName "dist/" }
          # Also grab any freetype/zlib DLLs that SDL2_ttf needs
          Get-ChildItem -Path deps -Recurse -Filter "*.dll" | Where-Object { $_.FullName -match "x86_64" } | ForEach-Object { Copy-Item $_.FullName "dist/" -ErrorAction SilentlyContinue }
          Compress-Archive -Path dist/* -DestinationPath "sel-checker-${{ matrix.arch-label }}.zip"

      - name: Upload artifact (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sel-checker-${{ matrix.arch-label }}
          path: sel-checker-${{ matrix.arch-label }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sel-checker-${{ matrix.arch-label }}
          path: sel-checker-${{ matrix.arch-label }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
